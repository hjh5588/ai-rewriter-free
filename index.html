<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Free AI Paraphraser</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
    }

    .box {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 10px #00000010;
    }

    h2 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      resize: none;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0056cc;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: #f1f1f1;
      border-radius: 8px;
      min-height: 100px;
      white-space: pre-wrap;
    }

    .tg {
      margin-top: 20px;
      text-align: center;
      color: #333;
    }

    .tg a {
      color: #007bff;
      font-weight: bold;
      text-decoration: none;
    }

    .limit {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Free AI Paraphraser | Rewrite Text</h2>
    <p class="limit">Free daily uses, no login needed (limit: 3 times/day)</p>

    <textarea id="input" placeholder="Paste your text here..."></textarea>

    <button onclick="rewrite()">Paraphrase</button>

    <div class="result" id="result"></div>
  </div>

  <div class="tg">
    Unlimited access & API unlock →
    <a href="https://t.me/+_kgwoWYK4yowYTFl" target="_blank">
      Join Our Telegram
    </a>
  </div>

  <script>
    let count = 0;

    async function rewrite() {
      if (count >= 3) {
        document.getElementById("result").innerText =
          "Daily limit reached. Join Telegram for unlimited access.";
        return;
      }

      let text = document.getElementById("input").value;

      if (!text) {
        alert("Please enter text first");
        return;
      }

      document.getElementById("result").innerText = "Processing...";

      try {
        const res = await fetch("https://YOUR_API_ENDPOINT_HERE", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "gpt-3.5-turbo",
            messages: [
              {
                role: "user",
                content: "Paraphrase this text: " + text
              }
            ]
          })
        });

        const data = await res.json();

        let out =
          data?.choices?.[0]?.message?.content || "Error: No response";

        document.getElementById("result").innerText = out;
        count++;

      } catch (err) {
        document.getElementById("result").innerText =
          "Error: API connection failed";
      }
    }
  </script>

</body>
</html>
